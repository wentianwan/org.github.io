<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文天玩WenTianPlay团队</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="cursor"></div>
    
    <header>
        <div id="stars-container">
            <div id="stars"></div>
            <div id="stars2"></div>
            <div id="stars3"></div>
            <div class="clouds">
                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
                <div class="cloud cloud3"></div>
                <div class="cloud cloud4"></div>
                <div class="cloud cloud5"></div>
                <div class="cloud cloud6"></div>
            </div>
            <div id="meteors-container"></div>
        </div>
        
        <div class="header-content">
            <div class="text-scramble">
                <h1>我们的<span class="scramble-text" data-text="团队">团队</span></h1>
            </div>
            <p class="typing-text">专业、创新、热情，共同创造价值</p>
        </div>
    </header>

    <section class="team-intro">
        <div class="container">
            <h2>我们是谁</h2>
            <div class="intro-content">
                <div class="intro-text">
                    <p>我们是一支充满激情和创造力的团队，专注于为客户提供最佳解决方案。团队成员来自不同领域，拥有丰富的经验和专业知识。</p>
                    <p>我们相信，只有通过协作和持续创新，才能应对当今快速变化的世界所带来的挑战。</p>
                </div>
                <div class="intro-stats">
                    <div class="stat">
                        <span class="stat-number" data-count="150">0</span>
                        <span class="stat-label">完成项目</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" data-count="98">0</span>
                        <span class="stat-label">满意客户</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" data-count="10">0</span>
                        <span class="stat-label">行业年限</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="team-members">
        <div class="container">
            <h2>团队成员</h2>
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="management">管理</button>
                <button class="filter-btn" data-filter="development">开发</button>
                <button class="filter-btn" data-filter="design">设计</button>
                <button class="filter-btn" data-filter="marketing">市场</button>
            </div>
            <div class="members-grid" id="team-members-container">
                <!-- 成员卡片将通过JS动态生成 -->
            </div>
        </div>
    </section>

    <section class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <p>xiaoke@qq.com</p>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <p>+86 123 4567 8910</p>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>北京市朝阳区某某路88号</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 我们的团队. 保留所有权利.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-weixin"></i></a>
                <a href="#"><i class="fab fa-weibo"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
